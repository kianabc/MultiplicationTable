<style>
/* ==================== VARIABLES & RESET ==================== */
:root {
  --primary: #7C4DFF;
  --primary-dark: #651FFF;
  --primary-light: #B388FF;
  --bg: #F3E5F5;
  --surface: #FFFFFF;
  --surface-hover: #F5F5F5;
  --text: #37474F;
  --text-light: #78909C;
  --new: #E0E0E0;
  --learning: #FF7043;
  --almost: #FFC107;
  --mastered: #4CAF50;
  --wrong-color: #FF7043;
  --star-color: #FFD54F;
  --nav-h: 64px;
  --sidebar-w: 220px;
  --radius: 16px;
  --radius-sm: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  font-size: clamp(14px, 2.5vw, 16px);
}
h1, h2, h3, .quiz-num, .grid-header, .stat-value, .btn-label {
  font-family: 'Fredoka One', cursive;
}
button {
  font-family: 'Nunito', sans-serif;
  cursor: pointer;
  border: none;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}
input {
  font-family: 'Nunito', sans-serif;
  outline: none;
}

/* ==================== LAYOUT ==================== */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
}
#main-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + 16px);
}
.view { display: none; min-height: 100%; padding: 20px 16px; }
.view.active { display: block; }

/* ==================== BOTTOM NAV ==================== */
#bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: space-around;
  box-shadow: 0 -2px 12px rgba(0,0,0,.08);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: none;
  color: var(--text-light);
  font-size: 11px;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: 12px;
  transition: color .2s;
}
.nav-btn .nav-icon { font-size: 24px; }
.nav-btn.active { color: var(--primary); }

/* ==================== WELCOME VIEW ==================== */
.welcome-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 80vh;
  text-align: center;
  gap: 24px;
}
.welcome-wrap h1 { font-size: clamp(28px, 6vw, 40px); color: var(--primary); }
.welcome-wrap p { color: var(--text-light); font-size: 18px; }
.welcome-input {
  font-size: 22px;
  padding: 14px 20px;
  border: 3px solid var(--primary-light);
  border-radius: var(--radius);
  text-align: center;
  width: 280px;
  max-width: 90%;
  transition: border-color .2s;
  font-weight: 700;
}
.welcome-input:focus { border-color: var(--primary); }

/* ==================== BUTTONS ==================== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 28px;
  border-radius: var(--radius);
  font-size: 17px;
  font-weight: 800;
  transition: transform .15s, box-shadow .15s, background .15s;
  min-height: 56px;
}
.btn:active { transform: scale(.96); }
.btn-primary { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(124,77,255,.3); }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: var(--surface); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.btn-block { width: 100%; }

/* ==================== DASHBOARD ==================== */
.dashboard { max-width: 480px; margin: 0 auto; text-align: center; }
.greeting { font-size: clamp(22px, 5vw, 30px); color: var(--primary); margin-bottom: 8px; }
.sub-greeting { color: var(--text-light); margin-bottom: 24px; }
.progress-ring-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 20px;
}
.progress-ring { transform: rotate(-90deg); }
.progress-ring-bg { fill: none; stroke: #E8E0F0; stroke-width: 12; }
.progress-ring-fill { fill: none; stroke: var(--primary); stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset .8s ease; }
.progress-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.progress-count { font-family: 'Fredoka One', cursive; font-size: 36px; color: var(--primary); }
.progress-label { font-size: 13px; color: var(--text-light); font-weight: 700; }
.stats-row {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 12px 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  text-align: center;
  min-width: 100px;
}
.stat-value { font-size: 24px; color: var(--primary); }
.stat-label { font-size: 12px; color: var(--text-light); font-weight: 700; }
.action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 8px;
}
.action-btn {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px 12px;
  box-shadow: 0 2px 10px rgba(0,0,0,.07);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  transition: transform .15s, box-shadow .15s;
}
.action-btn:active { transform: scale(.96); }
.action-icon { font-size: 32px; }
.action-label { font-weight: 800; font-size: 14px; color: var(--text); }

/* ==================== QUIZ ==================== */
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.quiz-progress-bar {
  flex: 1;
  height: 8px;
  background: #E8E0F0;
  border-radius: 4px;
  margin: 0 12px;
  overflow: hidden;
}
.quiz-progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 4px;
  transition: width .3s;
}
.quiz-counter { font-weight: 800; color: var(--text-light); min-width: 48px; }
.quiz-streak-badge {
  background: linear-gradient(135deg, #FF7043, #FF5722);
  color: #fff;
  border-radius: 20px;
  padding: 4px 12px;
  font-weight: 800;
  font-size: 14px;
  opacity: 0;
  transition: opacity .3s;
}
.quiz-streak-badge.visible { opacity: 1; }
.quiz-close-btn {
  background: none;
  font-size: 24px;
  color: var(--text-light);
  padding: 4px 8px;
}
.quiz-question-area {
  text-align: center;
  padding: 32px 0 24px;
}
.quiz-num {
  font-size: clamp(48px, 12vw, 72px);
  color: var(--text);
  line-height: 1.1;
}
.quiz-operator { color: var(--primary); }
.quiz-equals { color: var(--text-light); }
.quiz-choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  max-width: 360px;
  margin: 0 auto;
}
.choice-btn {
  font-family: 'Fredoka One', cursive;
  font-size: 28px;
  padding: 18px;
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 3px 10px rgba(0,0,0,.08);
  transition: transform .12s, background .2s, color .2s, box-shadow .2s;
  min-height: 64px;
}
.choice-btn:active { transform: scale(.95); }
.choice-btn.correct { background: var(--mastered); color: #fff; animation: correctPop .4s; }
.choice-btn.wrong { background: var(--wrong-color); color: #fff; animation: wrongShake .4s; }
.choice-btn.reveal { background: var(--mastered); color: #fff; opacity: .7; }
.typed-area {
  text-align: center;
  max-width: 300px;
  margin: 0 auto;
}
.typed-input {
  font-family: 'Fredoka One', cursive;
  font-size: 36px;
  text-align: center;
  border: 3px solid var(--primary-light);
  border-radius: var(--radius);
  padding: 14px;
  width: 160px;
  transition: border-color .2s;
}
.typed-input:focus { border-color: var(--primary); }
.typed-input.correct { border-color: var(--mastered); background: #E8F5E9; animation: correctPop .4s; }
.typed-input.wrong { border-color: var(--wrong-color); background: #FBE9E7; animation: wrongShake .4s; }
.quiz-feedback {
  text-align: center;
  margin-top: 16px;
  font-size: 18px;
  font-weight: 700;
  min-height: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.feedback-correct { color: var(--mastered); }
.feedback-wrong { color: var(--wrong-color); }
.tip-bubble {
  background: #FFF8E1;
  border: 2px solid #FFE082;
  border-radius: var(--radius);
  padding: 14px 20px;
  font-size: 15px;
  color: #5D4037;
  font-weight: 600;
  margin-top: 12px;
  max-width: 360px;
  text-align: center;
  line-height: 1.5;
  animation: slideInSimple .3s;
}
.tip-bubble .tip-label {
  color: #F57F17;
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.tip-bubble .tip-strategy {
  font-family: 'Fredoka One', cursive;
  font-size: 18px;
  color: var(--primary);
  margin-top: 4px;
}

/* ==================== RESULTS ==================== */
.results { max-width: 480px; margin: 0 auto; text-align: center; }
.results h2 { font-size: 28px; color: var(--primary); margin-bottom: 4px; }
.results-subtitle { color: var(--text-light); margin-bottom: 20px; font-weight: 600; }
.results-score {
  font-family: 'Fredoka One', cursive;
  font-size: 56px;
  color: var(--primary);
  margin: 16px 0;
}
.results-stars {
  font-size: 20px;
  color: var(--star-color);
  margin-bottom: 24px;
  font-weight: 700;
}
.results-breakdown {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 24px;
  text-align: left;
}
.result-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  font-weight: 600;
}
.result-item.was-correct { border-left: 4px solid var(--mastered); }
.result-item.was-wrong { border-left: 4px solid var(--wrong-color); }
.result-fact { font-family: 'Fredoka One', cursive; font-size: 16px; }
.result-badge { font-size: 13px; padding: 2px 10px; border-radius: 20px; font-weight: 700; }
.badge-new-mastery { background: #E8F5E9; color: var(--mastered); }
.badge-level-up { background: #FFF8E1; color: #F57F17; }

/* ==================== 12x12 GRID ==================== */
.grid-view { max-width: 600px; margin: 0 auto; }
.grid-view h2 { text-align: center; color: var(--primary); margin-bottom: 12px; }
.grid-filters {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 13px;
  background: var(--surface);
  color: var(--text-light);
  transition: all .2s;
}
.filter-btn.active { background: var(--primary); color: #fff; }
.grid-container {
  display: grid;
  grid-template-columns: 36px repeat(12, 1fr);
  grid-template-rows: 36px repeat(12, 1fr);
  gap: 3px;
  margin-bottom: 20px;
}
.grid-corner { background: none; }
.grid-header {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(11px, 2.5vw, 15px);
  color: var(--primary);
  position: relative;
}
.grid-header.gold { color: #F9A825; }
.grid-header .star-badge {
  position: absolute;
  top: -2px; right: -2px;
  font-size: 8px;
}
.grid-cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  font-family: 'Fredoka One', cursive;
  font-size: clamp(9px, 2vw, 13px);
  color: #fff;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  position: relative;
}
.grid-cell:active { transform: scale(1.15); z-index: 2; }
.grid-cell.speed-none { background: #fff; color: #BDBDBD; }
.grid-cell.speed-fast { background: #4CAF50; }
.grid-cell.speed-retired { background: #4A148C; color: #fff; }
.grid-cell.speed-medium { background: #FFF59D; color: #5D4037; }
.grid-cell.speed-slow { background: #EF5350; }
.grid-cell.dim { opacity: .2; }
.grid-summary {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.grid-summary-item {
  text-align: center;
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,.06);
}
.grid-summary-item .stat-value { font-size: 20px; }

/* Cell Popover */
.cell-popover {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: 0 8px 30px rgba(0,0,0,.18);
  z-index: 200;
  text-align: center;
  min-width: 260px;
  animation: slideIn .25s;
}
.popover-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.3);
  z-index: 199;
}
.popover-fact { font-family: 'Fredoka One', cursive; font-size: 28px; margin-bottom: 8px; }
.popover-level { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.popover-stats { font-size: 13px; color: var(--text-light); margin-bottom: 16px; }

/* ==================== TIPS ==================== */
.tips-view { max-width: 560px; margin: 0 auto; }
.tips-view h2 { text-align: center; color: var(--primary); margin-bottom: 16px; }
.tip-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  transition: transform .15s;
}
.tip-card:active { transform: scale(.98); }
.tip-card.locked { opacity: .45; filter: grayscale(.5); }
.tip-title { font-weight: 800; font-size: 16px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.tip-desc { font-size: 14px; color: var(--text-light); line-height: 1.5; }
.tip-example { font-family: 'Fredoka One', cursive; font-size: 15px; color: var(--primary); margin-top: 6px; }

/* ==================== STATS & ACHIEVEMENTS ==================== */
.stats-view { max-width: 560px; margin: 0 auto; }
.stats-view h2 { text-align: center; color: var(--primary); margin-bottom: 16px; }
.stats-overview {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}
.achievements-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.achievement-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 14px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,.06);
  transition: transform .15s;
}
.achievement-card.unlocked { border: 2px solid var(--star-color); }
.achievement-card.locked { opacity: .4; filter: grayscale(.6); }
.achievement-icon { font-size: 32px; margin-bottom: 6px; }
.achievement-name { font-weight: 800; font-size: 13px; }
.achievement-desc { font-size: 11px; color: var(--text-light); margin-top: 2px; }

/* ==================== SYNC MODAL ==================== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 28px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  animation: slideIn .25s;
}
.modal h3 { color: var(--primary); margin-bottom: 12px; }
.pin-display {
  font-family: 'Fredoka One', cursive;
  font-size: 36px;
  letter-spacing: 8px;
  color: var(--primary);
  margin: 16px 0;
}
.pin-input {
  font-family: 'Fredoka One', cursive;
  font-size: 28px;
  text-align: center;
  letter-spacing: 6px;
  border: 3px solid var(--primary-light);
  border-radius: var(--radius);
  padding: 10px;
  width: 200px;
}

/* ==================== ANIMATIONS ==================== */
@keyframes correctPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}
@keyframes starFloat {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-70px) scale(1.4); }
}
@keyframes slideIn {
  from { opacity: 0; transform: translate(-50%, -50%) scale(.92); }
  to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
@keyframes slideInSimple {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes confettiFall {
  0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
@keyframes bannerSlide {
  0% { transform: translateY(-100%); opacity: 0; }
  15% { transform: translateY(0); opacity: 1; }
  85% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100%); opacity: 0; }
}
.star-anim {
  position: fixed;
  pointer-events: none;
  font-size: 28px;
  z-index: 999;
  animation: starFloat .8s ease-out forwards;
}
.confetti-container {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  top: -12px;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  animation: confettiFall 2.5s ease-out forwards;
}
.banner {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 16px;
  text-align: center;
  font-family: 'Fredoka One', cursive;
  font-size: 20px;
  color: #fff;
  z-index: 500;
  animation: bannerSlide 3s ease forwards;
}
.banner-mastery { background: linear-gradient(135deg, var(--mastered), #2E7D32); }
.banner-achievement { background: linear-gradient(135deg, var(--primary), #4A148C); }

/* ==================== RESPONSIVE ==================== */
@media (min-width: 768px) {
  #bottom-nav {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    right: auto;
    width: var(--sidebar-w);
    height: 100%;
    flex-direction: column;
    justify-content: flex-start;
    padding: 24px 12px;
    gap: 8px;
    box-shadow: 2px 0 12px rgba(0,0,0,.06);
  }
  .nav-btn {
    flex-direction: row;
    width: 100%;
    padding: 12px 16px;
    font-size: 14px;
    gap: 10px;
    justify-content: flex-start;
  }
  #main-content {
    margin-left: var(--sidebar-w);
    padding-bottom: 16px;
  }
  .view { padding: 28px 32px; }
  .grid-container { gap: 4px; }
  .grid-cell { font-size: 14px; }
}
@media (max-width: 380px) {
  .quiz-choices { gap: 8px; }
  .choice-btn { padding: 14px; font-size: 24px; }
}
</style>
</head>
<body>
<div id="app">
  <div id="main-content">
    <!-- WELCOME -->

    <button class="nav-btn" data-view="grid"><span class="nav-icon">📊</span><span>Grid</span></button>
    <button class="nav-btn" data-view="stats"><span class="nav-icon">🏆</span><span>Awards</span></button>
  </nav>
</div>

<script>
/* ==================== STATE ==================== */
const DEFAULT_STATE = {
  profile: { name: '', createdAt: null, totalStars: 0, dailyStreak: 0, bestStreak: 0, lastPracticeDate: null, sessionsCount: 0 },
  problems: {},
  achievements: [],
  sessions: [],
  tipsUnlocked: [],
  firebaseUid: null
};

let state = JSON.parse(JSON.stringify(DEFAULT_STATE));
let quiz = { problems: [], index: 0, results: [], streak: 0, sessionStars: 0, startTime: 0, answered: false };
let audioCtx = null;

function initProblems() {
  for (let a = 1; a <= 12; a++)
    for (let b = 1; b <= 12; b++) {
      const k = `${a}x${b}`;
      if (!state.problems[k]) state.problems[k] = { level: 0, correct: 0, consecutive: 0, wrongStreak: 0, lastSeen: null, totalAttempts: 0, times: [], bestColor: 0 };
      else { if (!state.problems[k].times) state.problems[k].times = []; if (!state.problems[k].bestColor) state.problems[k].bestColor = 0; }
    }
}

function loadState() {
  try {
    const raw = localStorage.getItem('mult_master_state');
    if (raw) {
      const saved = JSON.parse(raw);
      state = { ...JSON.parse(JSON.stringify(DEFAULT_STATE)), ...saved };
      state.profile = { ...JSON.parse(JSON.stringify(DEFAULT_STATE.profile)), ...saved.profile };
    }
  } catch(e) { console.warn('Load failed', e); }
  initProblems();
}

function saveState() {
  try { localStorage.setItem('mult_master_state', JSON.stringify(state)); } catch(e) {}
  debouncedSync();
}

function masteredCount() {
  return Object.values(state.problems).filter(p => p.level >= 3).length;
}

/* ==================== VIEW MANAGER ==================== */
let currentView = 'welcome';

function showView(name) {
  if (name === 'quiz') return;
  // Block navigation during an active quiz — must finish to earn stars
  if (currentView === 'quiz' && quiz.index < quiz.problems.length) {
    if (!confirm('If you leave now, you will lose all stars from this session. Leave anyway?')) return;
    // Forfeit session stars
    state.profile.totalStars -= quiz.sessionStars;
    quiz.sessionStars = 0;
    saveState();
  }
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById(`view-${name}`);
  if (el) el.classList.add('active');
  currentView = name;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === name);
  });
  if (name === 'home') renderDashboard();
  else if (name === 'grid') renderGrid();
  else if (name === 'tips') renderTips();
  else if (name === 'stats') renderStats();
}

/* ==================== WELCOME ==================== */
function submitName() {
  const name = document.getElementById('welcome-name').value.trim();
  if (!name) return;
  state.profile.name = name;
  state.profile.createdAt = Date.now();
  saveState();
  document.getElementById('bottom-nav').style.display = 'flex';
  showView('home');
}

/* ==================== DASHBOARD ==================== */
function coloredCount() {
  // Count all problems that have a color (any bestColor > 0, i.e. not white)
  return Object.entries(state.problems).filter(([k, p]) => {
    const sc = getSpeedClass(p, k);
    return sc !== 'speed-none';
  }).length;
}

function renderDashboard() {
  const name = state.profile.name || 'Friend';
  const hour = new Date().getHours();
  const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('dash-greeting').textContent = `${greet}, ${name}!`;
  const nc = coloredCount();
  const msgs = nc === 0 ? "Let's start learning!" : nc < 20 ? "Great start! Keep going!" : nc < 50 ? "You're making awesome progress!" : nc < 100 ? "Over halfway there!" : nc < 144 ? "Almost a multiplication master!" : "You nailed them all!";
  document.getElementById('dash-sub').textContent = msgs;
  document.getElementById('dash-mastered').textContent = nc;
  document.getElementById('dash-stars').textContent = state.profile.totalStars;
  document.getElementById('dash-streak').textContent = state.profile.dailyStreak;
  document.getElementById('dash-sessions').textContent = state.profile.sessionsCount;

  const circ = document.getElementById('progress-circle');
  const circumference = 2 * Math.PI * 66;
  circ.style.strokeDasharray = circumference;
  circ.style.strokeDashoffset = circumference - (nc / 144) * circumference;
}

/* ==================== QUIZ ENGINE ==================== */
function selectProblems() {
  // Table order: easiest first, hardest last
  const TABLE_ORDER = [1, 10, 11, 2, 5, 9, 4, 3, 12, 6, 8, 7];

  // Check if a table is "done" — all 12 combos for that number are green/purple
  function tableComplete(n) {
    for (let i = 1; i <= 12; i++) {
      const key = `${n}x${i}`;
      const p = state.problems[key];
      const sc = getSpeedClass(p, key);
      if (sc !== 'speed-fast' && sc !== 'speed-retired') return false;
    }
    return true;
  }

  // Find the current focus table: first incomplete table in order
  let focusTable = TABLE_ORDER[TABLE_ORDER.length - 1];
  for (const t of TABLE_ORDER) {
    if (!tableComplete(t)) { focusTable = t; break; }
  }

  // Get unfinished problems for the focus table
  const focusProblems = [];
  const needsWork = [];  // red/yellow from ANY table
  const otherUntested = []; // untested from other tables (for sprinkling)

  for (let i = 1; i <= 12; i++) {
    const key = `${focusTable}x${i}`;
    const p = state.problems[key];
    if (isRetired(key)) continue;
    const sc = getSpeedClass(p, key);
    if (sc === 'speed-slow' || sc === 'speed-medium') {
      focusProblems.push({ key, priority: sc === 'speed-slow' ? 2 : 1 });
    } else if (sc === 'speed-none') {
      focusProblems.push({ key, priority: 0 });
    }
  }

  // Also collect red/yellow from other tables and untested from next tables
  const nextTables = TABLE_ORDER.filter(t => t !== focusTable && !tableComplete(t));
  Object.entries(state.problems).forEach(([key, p]) => {
    if (isRetired(key)) return;
    const [a] = key.split('x').map(Number);
    if (a === focusTable) return; // already handled
    const sc = getSpeedClass(p, key);
    if (sc === 'speed-slow' || sc === 'speed-medium') {
      needsWork.push({ key, priority: sc === 'speed-slow' ? 2 : 1 });
    } else if (sc === 'speed-none' && nextTables.slice(0, 2).includes(a)) {
      otherUntested.push({ key });
    }
  });

  // Sort: red first, then yellow, then untested
  focusProblems.sort((a, b) => b.priority - a.priority || Math.random() - 0.5);
  needsWork.sort((a, b) => b.priority - a.priority || Math.random() - 0.5);
  otherUntested.sort(() => Math.random() - 0.5);

  const selected = [];
  const usedKeys = new Set();
  function add(item) {
    if (selected.length >= 12 || usedKeys.has(item.key)) return false;
    selected.push(item.key);
    usedKeys.add(item.key);
    return true;
  }

  // 1. Focus table problems first (up to 8) — this is the main focus
  for (const e of focusProblems) {
    if (selected.length >= 8) break;
    add(e);
  }

  // 2. Red/yellow from other tables (up to 2) — don't ignore struggling problems
  for (const e of needsWork) {
    if (selected.length >= 10) break;
    add(e);
  }

  // 3. Sprinkle 1-2 from upcoming tables — preview what's next
  for (const e of otherUntested) {
    if (selected.length >= 12) break;
    add(e);
  }

  // 4. Fill remaining with more focus table or other needs-work
  for (const e of [...focusProblems, ...needsWork, ...otherUntested]) {
    if (selected.length >= 12) break;
    add(e);
  }

  // Shuffle so it doesn't feel predictable
  for (let i = selected.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [selected[i], selected[j]] = [selected[j], selected[i]];
  }
  return selected;
}

function generateDistractors(a, b, answer) {
  const pool = new Set();
  pool.add(a * (b + 1));
  pool.add(a * (b - 1));
  pool.add((a + 1) * b);
  pool.add((a - 1) * b);
  pool.add(a + b);
  pool.add(answer + a);
  pool.add(answer - a);
  pool.add(answer + b);
  pool.add(answer + 10);
  pool.add(answer - 10);
  pool.add(answer + 1);
  pool.add(answer - 1);
  pool.delete(answer);
  pool.delete(0);
  const valid = [...pool].filter(n => n > 0 && n <= 144);
  for (let i = valid.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [valid[i], valid[j]] = [valid[j], valid[i]];
  }
  return valid.slice(0, 3);
}

function startQuiz() {
  quiz = { problems: selectProblems(), index: 0, results: [], streak: 0, sessionStars: 0, startTime: 0, answered: false };
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-quiz').classList.add('active');
  document.getElementById('quiz-accuracy').textContent = '';
  currentView = 'quiz';
  showProblem();
}

function showProblem() {
  if (quiz.index >= quiz.problems.length) return showResults();
  quiz.answered = false;
  const key = quiz.problems[quiz.index];
  const [a, b] = key.split('x').map(Number);
  const answer = a * b;
  const prob = state.problems[key];

  document.getElementById('quiz-counter').textContent = `${quiz.index + 1}/12`;
  document.getElementById('quiz-bar').style.width = `${(quiz.index / 12) * 100}%`;
  document.getElementById('quiz-a').textContent = a;
  document.getElementById('quiz-b').textContent = b;
  document.getElementById('quiz-feedback').innerHTML = '';

  const streakBadge = document.getElementById('quiz-streak-badge');
  streakBadge.textContent = `🔥 ${quiz.streak}`;
  streakBadge.classList.toggle('visible', quiz.streak >= 2);

  const area = document.getElementById('quiz-answer-area');
  const useMultipleChoice = Math.random() < 0.75;
  if (useMultipleChoice) {
    const distractors = generateDistractors(a, b, answer);
    const options = [answer, ...distractors];
    for (let i = options.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [options[i], options[j]] = [options[j], options[i]];
    }
    area.innerHTML = `<div class="quiz-choices">${options.map(o =>
      `<button class="choice-btn" data-val="${o}" onclick="submitAnswer(${o})">${o}</button>`
    ).join('')}</div>`;
  } else {
    area.innerHTML = `<div class="typed-area">
      <input class="typed-input" id="typed-ans" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="3" autocomplete="off">
      <button class="btn btn-primary" style="margin-top:12px;min-width:160px" onclick="submitTyped()">Check</button>
    </div>`;
    setTimeout(() => document.getElementById('typed-ans')?.focus(), 100);
    document.getElementById('typed-ans')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitTyped();
    });
  }
  // Show tip below the answer area to help before answering
  const sc = getSpeedClass(prob, key);
  if (sc !== 'speed-fast' && sc !== 'speed-retired') {
    const tip = getSpecificTip(a, b, false);
    area.innerHTML += `<div class="tip-bubble" style="margin-top:12px;text-align:center">
      <div class="tip-label">💡 Hint</div>
      <div>${tip}</div>
    </div>`;
  }

  quiz.startTime = Date.now();
}

function submitTyped() {
  const input = document.getElementById('typed-ans');
  if (!input || quiz.answered) return;
  const val = parseInt(input.value);
  if (isNaN(val)) return;
  submitAnswer(val);
}

function submitAnswer(val) {
  if (quiz.answered) return;
  quiz.answered = true;
  const key = quiz.problems[quiz.index];
  const [a, b] = key.split('x').map(Number);
  const answer = a * b;
  const correct = val === answer;
  const elapsed = (Date.now() - quiz.startTime) / 1000;
  const prob = state.problems[key];
  const isTyped = !!document.getElementById('typed-ans');

  let starsEarned = 0;
  if (correct) {
    starsEarned += isTyped ? 2 : 1;
    if (elapsed < 3) starsEarned += 1;
    quiz.streak++;
  } else {
    quiz.streak = 0;
  }

  // Track response time (only multiple choice — typed input takes longer to type, not fair)
  if (!isTyped) {
    const time = correct ? Math.min(elapsed, 20) : 10; // Wrong answer = 10s penalty
    prob.times.push(time);
    if (prob.times.length > 5) prob.times = prob.times.slice(-5);
    // Sync time to commutative partner
    if (a !== b) {
      const pp = state.problems[`${b}x${a}`];
      pp.times.push(time);
      if (pp.times.length > 5) pp.times = pp.times.slice(-5);
    }
    // Update best color (ratchet — only goes up)
    if (correct) updateBestColor(key);
  }

  const prevLevel = prob.level;
  updateMastery(key, correct);
  const newLevel = state.problems[key].level;
  const leveledUp = newLevel > prevLevel;
  const newlyMastered = newLevel === 3 && prevLevel < 3;
  if (newlyMastered) starsEarned += 3;

  quiz.sessionStars += starsEarned;
  state.profile.totalStars += starsEarned;

  quiz.results.push({ key, a, b, answer, given: val, correct, elapsed, starsEarned, leveledUp, newlyMastered, newLevel });

  // Update commutative partner mastery
  if (a !== b) {
    const partner = `${b}x${a}`;
    const pp = state.problems[partner];
    if (correct && pp.level < newLevel) {
      pp.correct++;
      pp.lastSeen = Date.now();
    }
  }

  // Update accuracy display
  const answered = quiz.results.length + 1;
  const correctSoFar = quiz.results.filter(r => r.correct).length + (correct ? 1 : 0);
  const pct = Math.round((correctSoFar / answered) * 100);
  const accEl = document.getElementById('quiz-accuracy');
  accEl.textContent = `${pct}%`;
  accEl.style.color = pct >= 80 ? 'var(--mastered)' : pct >= 50 ? '#FFC107' : 'var(--wrong-color)';

  // Visual feedback
  const feedbackEl = document.getElementById('quiz-feedback');
  const speedClass = getSpeedClass(prob, key);
  const showTip = speedClass !== 'speed-fast' && speedClass !== 'speed-retired';
  let delay = correct ? 1200 : 2200;

  if (correct) {
    playSound('correct');
    if (starsEarned > 0) floatStar(starsEarned);
    feedbackEl.innerHTML = `<span class="feedback-correct">${pickRandom(CORRECT_MSGS)}</span>`;
    if (isTyped) {
      const inp = document.getElementById('typed-ans');
      if (inp) inp.classList.add('correct');
    } else {
      document.querySelector(`.choice-btn[data-val="${val}"]`)?.classList.add('correct');
    }
  } else {
    playSound('wrong');
    feedbackEl.innerHTML = `<span class="feedback-wrong">${pickRandom(WRONG_MSGS)} ${a} × ${b} = ${answer}</span>`;
    if (isTyped) {
      const inp = document.getElementById('typed-ans');
      if (inp) inp.classList.add('wrong');
    } else {
      document.querySelector(`.choice-btn[data-val="${val}"]`)?.classList.add('wrong');
      setTimeout(() => {
        document.querySelector(`.choice-btn[data-val="${answer}"]`)?.classList.add('reveal');
      }, 300);
    }
  }

  // Show inline tip for any non-green/gold problem (both correct and wrong)
  if (showTip) {
    const specificTip = getSpecificTip(a, b, true);
    feedbackEl.innerHTML += `<div class="tip-bubble">
      <div class="tip-label">💡 Quick trick</div>
      <div>${specificTip}</div>
      <div class="tip-strategy">${a} × ${b} = ${answer}</div>
    </div>`;
    delay = correct ? 3000 : 3500;
    const tip = getTipForProblem(a, b);
    if (tip) unlockTip(tip.id);
  }

  if (newlyMastered) {
    showBanner(`You mastered ${a} × ${b}!`, 'mastery');
    checkTableCompletion(a, b);
  } else if (leveledUp) {
    feedbackEl.innerHTML += `<div style="color:var(--primary);font-size:14px;margin-top:4px">⬆️ Level up!</div>`;
  }

  saveState();
  const streakBadge = document.getElementById('quiz-streak-badge');
  streakBadge.textContent = `🔥 ${quiz.streak}`;
  streakBadge.classList.toggle('visible', quiz.streak >= 2);

  setTimeout(() => { quiz.index++; showProblem(); }, delay);
}

function updateMastery(key, correct) {
  const p = state.problems[key];
  p.totalAttempts++;
  p.lastSeen = Date.now();
  if (correct) {
    p.correct++;
    p.consecutive++;
    p.wrongStreak = 0;
    if (p.level === 0 && p.correct >= 2) p.level = 1;
    if (p.level === 1 && p.consecutive >= 3) p.level = 2;
    if (p.level === 2 && p.consecutive >= 6) p.level = 3;
  } else {
    p.consecutive = 0;
    p.wrongStreak++;
    if (p.wrongStreak >= 2 && p.level > 0) { p.level--; p.wrongStreak = 0; }
  }
}

function checkTableCompletion(a, b) {
  [a, b].forEach(n => {
    let complete = true;
    for (let i = 1; i <= 12; i++) {
      if (state.problems[`${n}x${i}`].level < 3) { complete = false; break; }
    }
    if (complete) {
      showBanner(`You completed the ${n}s table!`, 'mastery');
      showConfetti();
    }
  });
}

/* ==================== RESULTS ==================== */
function showResults() {
  const correctCount = quiz.results.filter(r => r.correct).length;
  const isPerfect = correctCount === 12;
  if (isPerfect) {
    quiz.sessionStars += 5;
    state.profile.totalStars += 5;
  }

  state.profile.sessionsCount++;
  updateDailyStreak();
  state.sessions.push({ date: Date.now(), score: correctCount, stars: quiz.sessionStars });
  if (state.sessions.length > 50) state.sessions = state.sessions.slice(-50);

  const newAch = checkAchievements();
  saveState();

  if (isPerfect) playSound('fanfare');

  const el = document.getElementById('results-content');
  const pct = Math.round((correctCount / 12) * 100);
  let html = `<h2>${isPerfect ? 'Perfect Score!' : correctCount >= 9 ? 'Great Job!' : correctCount >= 6 ? 'Nice Work!' : 'Keep Practicing!'}</h2>`;
  html += `<p class="results-subtitle">${pickRandom(SESSION_MSGS)}</p>`;
  html += `<div class="results-score">${correctCount}/12</div>`;
  html += `<div style="font-size:22px;font-weight:800;margin-bottom:8px;color:${pct >= 80 ? 'var(--mastered)' : pct >= 50 ? '#FFC107' : 'var(--wrong-color)'}">${pct}% Accuracy</div>`;
  html += pct === 100 ? `<div style="font-size:15px;color:var(--mastered);margin-bottom:8px;font-weight:700">Flawless! Can you do it again?</div>` :

function updateDailyStreak() {
  const today = new Date().toDateString();
  const last = state.profile.lastPracticeDate;
  if (last === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (last === yesterday) {
    state.profile.dailyStreak++;
  } else if (last !== today) {
    // Check if we should auto-freeze (5+ sessions this week)
    const weekAgo = Date.now() - 7 * 86400000;
    const thisWeek = state.sessions.filter(s => s.date > weekAgo).length;
    if (thisWeek >= 5 && state.profile.dailyStreak > 0) {
      // Freeze: keep streak
    } else {
      state.profile.dailyStreak = last ? 1 : 1;
    }
  }
  state.profile.lastPracticeDate = today;
  if (state.profile.dailyStreak > state.profile.bestStreak) state.profile.bestStreak = state.profile.dailyStreak;
}

function quitQuiz() { showView('home'); }

/* ==================== 12x12 GRID ==================== */
let gridFilter = 'all';

function getCombinedTimes(key) {
  // Merge times from both commutative pairs (3x4 and 4x3 share results)
  const [a, b] = key.split('x').map(Number);
  const times = [...(state.problems[key]?.times || [])];
  if (a !== b) {
    const partner = `${b}x${a}`;
    times.push(...(state.problems[partner]?.times || []));
  }
  // Sort by recency (last entries are most recent) and take last 5
  return times.slice(-5);
}

// Color ranks: 0=none, 1=slow(red), 2=medium(yellow), 3=fast(green), 4=retired(gold)
const COLOR_RANKS = { 'speed-none': 0, 'speed-slow': 1, 'speed-medium': 2, 'speed-fast': 3, 'speed-retired': 4 };
const RANK_TO_CLASS = ['speed-none', 'speed-slow', 'speed-medium', 'speed-fast', 'speed-retired'];

function getRawSpeedRank(key) {
  const times = getCombinedTimes(key);
  if (times.length < 3) return 0;
  const avg = times.reduce((a, b) => a + b, 0) / times.length;
  if (avg < 3) return 4; // nailed (purple)
  if (avg < 4) return 3; // green
  if (avg <= 7) return 2; // yellow
  return 1; // red
}

function getSpeedClass(p, key) {
  if (!key) {
    const times = p.times || [];
    if (times.length < 3) return 'speed-none';
    const avg = times.reduce((a, b) => a + b, 0) / times.length;
    if (avg < 3) return 'speed-retired';
    if (avg < 4) return 'speed-fast';
    if (avg <= 7) return 'speed-medium';
    return 'speed-slow';
  }
  const rawRank = getRawSpeedRank(key);
  // Ratchet: never go below the best achieved color
  const best = p.bestColor || 0;
  const rank = Math.max(rawRank, best);
  // Also check commutative partner's bestColor
  const [a, b] = key.split('x').map(Number);
  if (a !== b) {
    const partnerBest = state.problems[`${b}x${a}`]?.bestColor || 0;
    const finalRank = Math.max(rank, partnerBest);
    return RANK_TO_CLASS[finalRank];
  }
  return RANK_TO_CLASS[rank];
}

function updateBestColor(key) {
  const rank = getRawSpeedRank(key);
  const [a, b] = key.split('x').map(Number);
  const p = state.problems[key];
  if (rank > (p.bestColor || 0)) p.bestColor = rank;
  // Sync to commutative partner
  if (a !== b) {
    const pp = state.problems[`${b}x${a}`];
    if (rank > (pp.bestColor || 0)) pp.bestColor = rank;
  }
}

function getAvgSpeed(p, key) {
  const times = key ? getCombinedTimes(key) : (p.times || []);
  if (times.length < 3) return null;
  return times.reduce((a, b) => a + b, 0) / times.length;
}

function isRetired(key) {
  // Retired = green or purple (both count as completed)
  const p = state.problems[key];
  const [a, b] = key.split('x').map(Number);
  const best = Math.max(p.bestColor || 0, a !== b ? (state.problems[`${b}x${a}`]?.bestColor || 0) : 0);
  return best >= 3;
}

function renderGrid() {
  // Filters
  const filtersEl = document.getElementById('grid-filters');
  filtersEl.innerHTML = ['all', 'slow', 'fast'].map(f =>
    `<button class="filter-btn ${gridFilter === f ? 'active' : ''}" onclick="setGridFilter('${f}')">${f === 'all' ? 'All' : f === 'slow' ? 'Needs Work' : 'Fast'}</button>`
  ).join('');

  const container = document.getElementById('grid-container');
  let html = '<div class="grid-corner"></div>';

  // Column headers
  for (let b = 1; b <= 12; b++) {
    const gold = isRowComplete(b);
    html += `<div class="grid-header ${gold ? 'gold' : ''}">${b}${gold ? '<span class="star-badge">⭐</span>' : ''}</div>`;
  }

  // Count speed categories for summary
  let fastCount = 0, medCount = 0, slowCount = 0, unpracticed = 0, retiredCount = 0;

  // Rows
  for (let a = 1; a <= 12; a++) {
    const gold = isColComplete(a);
    html += `<div class="grid-header ${gold ? 'gold' : ''}">${a}${gold ? '<span class="star-badge">⭐</span>' : ''}</div>`;
    for (let b = 1; b <= 12; b++) {
      const key = `${a}x${b}`;
      const p = state.problems[key];
      const sc = getSpeedClass(p, key);
      if (sc === 'speed-retired') retiredCount++;
      else if (sc === 'speed-fast') fastCount++;
      else if (sc === 'speed-medium') medCount++;
      else if (sc === 'speed-slow') slowCount++;
      else unpracticed++;
      const dim = (gridFilter === 'slow' && (sc === 'speed-fast' || sc === 'speed-retired'))
              || (gridFilter === 'fast' && sc !== 'speed-fast' && sc !== 'speed-retired');
      html += `<div class="grid-cell ${sc} ${dim ? 'dim' : ''}" onclick="showCellPopover(${a},${b})" title="${a}×${b}">${sc === 'speed-retired' ? '✓' : a * b}</div>`;
    }
  }
  container.innerHTML = html;

  // Summary
  document.getElementById('grid-summary').innerHTML = `
    <div class="grid-summary-item"><div class="stat-value" style="color:#4A148C">${retiredCount}</div><div class="stat-label">Nailed (&lt;3s)</div></div>
    <div class="grid-summary-item"><div class="stat-value" style="color:#4CAF50">${fastCount}</div><div class="stat-label">Fast (3-4s)</div></div>
    <div class="grid-summary-item"><div class="stat-value" style="color:#FFC107">${medCount}</div><div class="stat-label">Medium (4-7s)</div></div>
    <div class="grid-summary-item"><div class="stat-value" style="color:#EF5350">${slowCount}</div><div class="stat-label">Slow (&gt;6s)</div></div>
  `;
}

function setGridFilter(f) { gridFilter = f; renderGrid(); }

function isRowComplete(b) {
  for (let a = 1; a <= 12; a++) if (state.problems[`${a}x${b}`].level < 3) return false;
  return true;
}
function isColComplete(a) {
  for (let b = 1; b <= 12; b++) if (state.problems[`${a}x${b}`].level < 3) return false;
  return true;
}
function countCompleteTables() {
  let count = 0;
  for (let n = 1; n <= 12; n++) if (isColComplete(n)) count++;
  return count;
}
function findHardestProblems() {
  return Object.entries(state.problems)
    .filter(([, p]) => p.totalAttempts > 0 && p.level < 3)
    .sort((a, b) => (a[1].correct / (a[1].totalAttempts || 1)) - (b[1].correct / (b[1].totalAttempts || 1)))
    .slice(0, 3)
    .map(([k]) => k);
}

function showCellPopover(a, b) {
  const key = `${a}x${b}`;
  const p = state.problems[key];
  const avg = getAvgSpeed(p, key);
  const retired = isRetired(key);
  const sc = getSpeedClass(p, key);
  const mastered = sc === 'speed-fast' || sc === 'speed-retired';
  const masteryLabel = mastered ? 'Mastered' : (p.times || []).length >= 3 ? 'Learning' : 'New';
  const masteryColor = mastered ? 'var(--mastered)' : (p.times || []).length >= 3 ? 'var(--learning)' : 'var(--new)';
  const speedLabel = avg === null ? '' : retired ? '✓ Nailed it!' : avg < 4 ? '🟢 Fast' : avg <= 7 ? '🟡 Medium' : '🔴 Slow';
  const speedDetail = avg !== null ? ` · Avg ${avg.toFixed(1)}s` : '';

  // Times are already synced between commutative pairs, so just use this problem's times
  const lastTimes = (p.times || []).slice(-5);

  const overlay = document.createElement('div');
  overlay.className = 'popover-overlay';
  overlay.onclick = () => overlay.remove();

  const pop = document.createElement('div');
  pop.className = 'cell-popover';
  pop.innerHTML = `
    <div class="popover-fact">${a} × ${b} = ${a * b}</div>
    <div class="popover-level" style="color:${masteryColor}">${masteryLabel}</div>
    ${speedLabel ? `<div style="font-weight:700;font-size:15px;margin:4px 0">${speedLabel}${speedDetail}</div>` : ''}
    ${lastTimes.length > 0 ? `<div style="display:flex;gap:6px;justify-content:center;margin:8px 0">
      ${lastTimes.map(t => {
        const c = t < 3 ? '#4A148C' : t < 4 ? '#4CAF50' : t <= 7 ? '#C0CA33' : '#EF5350';
        return `<div style="background:${c};color:#fff;border-radius:6px;padding:4px 8px;font-weight:800;font-size:13px">${t.toFixed(1)}s</div>`;
      }).join('')}
    </div>` : ''}
    <div class="popover-stats">
      ${p.totalAttempts > 0 ? `${p.correct}/${p.totalAttempts} correct · ${p.consecutive} in a row` : 'Not practiced yet'}
    </div>
  `;
  overlay.appendChild(pop);
  document.body.appendChild(overlay);
}

function getSpecificTip(a, b, showAnswer) {
  const answer = a * b;
  // If showAnswer is false, teach the strategy without giving the result
  if (showAnswer) {
    // Full worked example (shown AFTER answering)
    if (a === 1 || b === 1) { const o = a === 1 ? b : a; return `Any number × 1 = itself → ${answer}`; }
    if (a === 10 || b === 10) { const o = a === 10 ? b : a; return `Add a zero to ${o} → ${answer}`; }
    if (a === 2 || b === 2) { const o = a === 2 ? b : a; return `Double ${o}: ${o} + ${o} = ${answer}`; }
    if (a === 5 || b === 5) { const o = a === 5 ? b : a; return o % 2 === 0 ? `Half of ${o} is ${o/2}, then ×10 → ${answer}` : `Count by 5s: ${Array.from({length:o},(_,i)=>(i+1)*5).join(', ')}`; }
    if (a === 11 || b === 11) { const o = a === 11 ? b : a; if (o <= 9) return `Repeat the digit: ${answer}!`; return `${o}×10 + ${o} = ${answer}`; }
    if (a === 4 || b === 4) { const o = a === 4 ? b : a; return `Double-double: ${o} → ${o*2} → ${answer}`; }
    if (a === 9 || b === 9) { const o = a === 9 ? b : a; return `${o}×10 − ${o} = ${answer}`; }
    if (a === 8 || b === 8) { const o = a === 8 ? b : a; return `Double three times: ${o} → ${o*2} → ${o*4} → ${answer}`; }
    if (a === 3 || b === 3) { const o = a === 3 ? b : a; return `Triple: ${o} + ${o} + ${o} = ${answer}`; }
    if (a === 12 || b === 12) { const o = a === 12 ? b : a; return `${o}×10 + ${o}×2 = ${o*10} + ${o*2} = ${answer}`; }
    if (a === b) return `${a} squared = ${answer}`;
    if (Math.abs(a-b) === 1) { const s = Math.min(a,b); return `${s}×${s} = ${s*s}, plus ${s} more = ${answer}`; }
    if (a === 6 || b === 6) { const o = a === 6 ? b : a; return `${o}×3 = ${o*3}, then double = ${answer}`; }
    if (a === 7 || b === 7) { const o = a === 7 ? b : a; return `${o}×5 + ${o}×2 = ${answer}`; }
    return `${a}×${Math.floor(b/2)} = ${a*Math.floor(b/2)}, then double = ${answer}`;
  }
  // Hint only — NO answer (shown BEFORE answering)
  if (a === 1 || b === 1) return `Any number × 1 = itself!`;
  if (a === 10 || b === 10) { const o = a === 10 ? b : a; return `Just add a zero to ${o}!`; }
  if (a === 2 || b === 2) { const o = a === 2 ? b : a; return `Double ${o}: add ${o} + ${o}`; }
  if (a === 5 || b === 5) { const o = a === 5 ? b : a; return o % 2 === 0 ? `Half of ${o}, then add a zero` : `Count by 5s, ${o} times`; }
  if (a === 11 || b === 11) { const o = a === 11 ? b : a; if (o <= 9) return `× 11 for single digits: just repeat the digit!`; return `Think: ${o} × 10, then add ${o} more`; }
  if (a === 4 || b === 4) { const o = a === 4 ? b : a; return `Double-double! Double ${o}, then double again`; }
  if (a === 9 || b === 9) { const o = a === 9 ? b : a; return `Think: ${o} × 10, then subtract ${o}`; }
  if (a === 8 || b === 8) { const o = a === 8 ? b : a; return `Double ${o} three times in a row!`; }
  if (a === 3 || b === 3) { const o = a === 3 ? b : a; return `Add ${o} + ${o} + ${o}`; }
  if (a === 12 || b === 12) { const o = a === 12 ? b : a; return `Think: ${o} × 10, then add ${o} × 2`; }
  if (a === b) return `What's ${a} squared? Memorize this one!`;
  if (Math.abs(a-b) === 1) { const s = Math.min(a,b); return `Start with ${s} × ${s}, then add ${s} more`; }
  if (a === 6 || b === 6) { const o = a === 6 ? b : a; return `Find ${o} × 3 first, then double it`; }
  if (a === 7 || b === 7) { const o = a === 7 ? b : a; return `Split it: ${o} × 5 plus ${o} × 2`; }
  return `Try breaking it up: ${a} × ${Math.floor(b/2)}, then double`;
}

function getTipForProblem(a, b) {
  for (const tip of TIPS) {
    if (tip.factors === 'commutative') continue; // Only show as fallback
    if (tip.factors === 'squares' && a === b) return tip;
    if (tip.factors === 'near_squares' && Math.abs(a - b) === 1) return tip;
    if (Array.isArray(tip.factors) && (tip.factors.includes(a) || tip.factors.includes(b))) return tip;
  }
  return TIPS.find(t => t.id === 'commutative');
}

function unlockTip(id) {
  if (!state.tipsUnlocked.includes(id)) {
    state.tipsUnlocked.push(id);
    saveState();
  }
}

function renderTips() {

}

function checkAchievements() {
  // Track best answer streak
  if (!state.profile.bestAnswerStreak) state.profile.bestAnswerStreak = 0;
  if (quiz.streak > state.profile.bestAnswerStreak) state.profile.bestAnswerStreak = quiz.streak;

  // Track fast answers and perfect sessions
  const lastResult = quiz.results[quiz.results.length - 1];
  if (lastResult && lastResult.elapsed < 3 && lastResult.correct) {
    if (state.sessions.length > 0) state.sessions[state.sessions.length - 1].fastAnswer = true;
    else state._hasFastAnswer = true;
  }

  const newlyUnlocked = [];
  for (const ach of ACHIEVEMENTS) {
    if (state.achievements.includes(ach.id)) continue;
    if (ach.check()) {
      state.achievements.push(ach.id);
      newlyUnlocked.push(ach);
      playSound('fanfare');
      showBanner(`${ach.icon} ${ach.name} unlocked!`, 'achievement');
    }
  }
  return newlyUnlocked;
}

/* ==================== SOUNDS (Web Audio API) ==================== */
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playSound(type) {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;

    if (type === 'correct') {
      [523, 659, 784].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.12, now + i * 0.08);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.25);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now + i * 0.08);
        osc.stop(now + i * 0.08 + 0.3);
      });
    } else if (type === 'wrong') {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = 200;
      osc.frequency.linearRampToValueAtTime(150, now + 0.2);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.35);
    } else if (type === 'fanfare') {
      [523, 659, 784, 1047].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.12, now + i * 0.12);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.4);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now + i * 0.12);
        osc.stop(now + i * 0.12 + 0.5);
      });
    }
  } catch (e) {}
}

/* ==================== FIREBASE ==================== */
let db = null;
let syncTimeout = null;

function debouncedSync() {
  if (!db) return;
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(syncToFirebase, 500);
}

async function initFirebase() {
  try {
    if (typeof firebase === 'undefined') return;
    const app = firebase.app();
    db = firebase.firestore();
    const auth = firebase.auth();

    auth.onAuthStateChanged(async user => {
      if (user) {
        state.firebaseUid = user.uid;
        saveState();
        await syncFromFirebase();
      } else {
        try { await auth.signInAnonymously(); } catch(e) { console.warn('Auth failed', e); }
      }
    });
  } catch(e) { console.warn('Firebase init skipped', e); }
}

async function syncToFirebase() {
  if (!db || !state.firebaseUid) return;
  try {
    await db.collection('users').doc(state.firebaseUid).set({
      profile: state.profile,
      problems: state.problems,
      achievements: state.achievements,
      sessions: state.sessions.slice(-20),
      tipsUnlocked: state.tipsUnlocked,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  } catch(e) { console.warn('Sync to failed', e); }
}

async function syncFromFirebase() {
  if (!db || !state.firebaseUid) return;
  try {
    const doc = await db.collection('users').doc(state.firebaseUid).get();
    if (doc.exists) {
      const remote = doc.data();
      mergeState(remote);
      saveState();
      if (currentView === 'home') renderDashboard();
    }
  } catch(e) { console.warn('Sync from failed', e); }
}

function mergeState(remote) {
  if (!remote) return;
  // Take higher mastery and more recent timestamps
  if (remote.problems) {
    for (const [key, rp] of Object.entries(remote.problems)) {
      const lp = state.problems[key];
      if (!lp) { state.problems[key] = rp; continue; }
      if (rp.level > lp.level) {
        state.problems[key] = rp;
      } else if (rp.level === lp.level && rp.lastSeen > lp.lastSeen) {
        state.problems[key] = rp;
      }
    }
  }
  if (remote.profile) {
    state.profile.totalStars = Math.max(state.profile.totalStars, remote.profile.totalStars || 0);
    state.profile.dailyStreak = Math.max(state.profile.dailyStreak, remote.profile.dailyStreak || 0);
    state.profile.bestStreak = Math.max(state.profile.bestStreak || 0, remote.profile.bestStreak || 0);
    state.profile.sessionsCount = Math.max(state.profile.sessionsCount, remote.profile.sessionsCount || 0);
  }
  if (remote.achievements) {
    for (const a of remote.achievements) {
      if (!state.achievements.includes(a)) state.achievements.push(a);
    }
  }
  if (remote.tipsUnlocked) {
    for (const t of remote.tipsUnlocked) {
      if (!state.tipsUnlocked.includes(t)) state.tipsUnlocked.push(t);
    }
  }
}

/* ==================== SYNC PIN SYSTEM ==================== */
async function generateSyncPin() {
  if (!db || !state.firebaseUid) return null;
  const pin = String(Math.floor(100000 + Math.random() * 900000));
  try {
    // Make sure user data is saved first
    await syncToFirebase();
    await db.collection('sync_pins').doc(pin).set({
      uid: state.firebaseUid,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000)
    });
    return pin;
  } catch(e) {
    console.error('PIN gen failed:', e.code, e.message);
    return null;
  }
}

async function redeemSyncPin(pin) {
  if (!db) return false;
  try {
    const doc = await db.collection('sync_pins').doc(pin).get();
    if (!doc.exists) return false;
    const data = doc.data();
    if (data.expiresAt.toDate() < new Date()) return false;
    // Sync from that user's data
    const userDoc = await db.collection('users').doc(data.uid).get();
    if (userDoc.exists) {
      mergeState(userDoc.data());
      state.firebaseUid = data.uid;
      saveState();
      await syncToFirebase();
      return true;
    }
    return false;
  } catch(e) { console.warn('PIN redeem failed', e); return false; }
}

async function handleGeneratePin(btn) {
  btn.disabled = true;
  btn.textContent = 'Generating...';
  const status = document.getElementById('sync-status');
  try {
    const pin = await generateSyncPin();
    if (pin) {
      status.innerHTML = `<div>Your sync code:</div><div class="pin-display">${pin}</div><div style="font-size:12px;color:var(--text-light)">Expires in 24 hours</div>`;
    } else {
      status.innerHTML = `<span style="color:var(--wrong-color)">Could not generate code. Check that Anonymous Auth and Firestore are enabled in Firebase console.</span>`;
    }
  } catch(e) {
    status.innerHTML = `<span style="color:var(--wrong-color)">Error: ${e.message}</span>`;
  }
  btn.disabled = false;
  btn.textContent = 'Get Sync Code';
}

async function handleRedeemPin() {
  const pin = document.getElementById('pin-entry')?.value.trim();
  if (!pin || pin.length !== 6) return;
  const status = document.getElementById('sync-status');
  status.textContent = 'Linking...';
  const ok = await redeemSyncPin(pin);
  if (ok) {
    status.innerHTML = '<span style="color:var(--mastered)">Linked! Your progress has been synced.</span>';
    renderDashboard();
  } else {
    status.innerHTML = '<span style="color:var(--wrong-color)">Invalid or expired code.</span>';
  }
}

/* ==================== INIT ==================== */
function syncCommutativePairs() {
  // Ensure commutative pairs (4x7 and 7x4) always share the same bestColor and times
  for (let a = 1; a <= 12; a++) {
    for (let b = a + 1; b <= 12; b++) {
      const k1 = `${a}x${b}`, k2 = `${b}x${a}`;
      const p1 = state.problems[k1], p2 = state.problems[k2];
      if (!p1 || !p2) continue;
      // Sync bestColor: take the higher one
      const best = Math.max(p1.bestColor || 0, p2.bestColor || 0);
      p1.bestColor = best;
      p2.bestColor = best;
      // Sync times: merge and keep last 3
      const allTimes = [...(p1.times || []), ...(p2.times || [])].slice(-5);
      p1.times = [...allTimes];
      p2.times = [...allTimes];
    }
  }
}

  loadState();

  document.querySelectorAll('.nav-btn[data-view]').forEach(btn => {
    if (btn.dataset.view !== 'quiz') {
      btn.addEventListener('click', () => showView(btn.dataset.view));
    }
  });

  // Start with easy tips unlocked (easy to hard progression)
  ['ones', 'twos', 'tens', 'fives', 'elevens_small', 'commutative'].forEach(id => unlockTip(id));

  // Unlock additional tips for problems already encountered
  for (const [key, p] of Object.entries(state.problems)) {
    if (p.totalAttempts > 0) {
      const [a, b] = key.split('x').map(Number);
      const tip = getTipForProblem(a, b);
      if (tip) unlockTip(tip.id);
    }
  }

  // Firebase (optional)
  initFirebase();
}
